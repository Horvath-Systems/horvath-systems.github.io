<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" data-i18n-attr="content:terms.meta.desc" content="" />
    <meta name="theme-color" content="#04060a" />
    <title data-i18n="terms.meta.title">Horvath Systems</title>

    <link rel="icon" href="assets/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Orbitron:wght@500;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles.css" />

    <style>
      .policy-wrap {
        padding: 84px 0 18px;
      }
      .policy-card {
        max-width: 920px;
        margin: 0 auto;
      }
      .policy-card h1 {
        margin: 0 0 8px;
        line-height: 1.1;
        letter-spacing: -0.02em;
        font-size: clamp(34px, 4vw, 48px);
      }
      .policy-meta {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin: 12px 0 18px;
      }
      .policy-text {
        margin-top: 10px;
        color: rgba(170, 182, 207, 0.95);
        line-height: 1.8;
        font-weight: 600;
        font-size: 15px;
      }
      .policy-text strong {
        color: rgba(233, 238, 249, 0.92);
      }
      .policy-actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 18px;
      }
    </style>
  </head>

  <body>
    <div class="bg">
      <div class="grid"></div>
      <div class="glow glow-a"></div>
      <div class="glow glow-b"></div>
      <div class="noise"></div>
    </div>

    <header class="header" id="top">
      <div class="container header-inner">
        <a class="brand" href="index.html#top" aria-label="Horvath Systems Home">
          <img class="brand-logo" src="assets/logo.png" alt="Horvath Systems logo" />
          <div class="brand-text">
            <span class="brand-name">HORVATH</span>
            <span class="brand-sub">SYSTEMS</span>
          </div>
        </a>

        <nav class="nav" aria-label="Main navigation">
          <a href="index.html#services" data-i18n="nav.services">Szolgáltatások</a>
          <a href="index.html#projects" data-i18n="nav.projects">Projektek</a>
          <a href="index.html#about" data-i18n="nav.about">Rólam</a>
          <a href="index.html#contact" data-i18n="nav.contact">Kapcsolat</a>
        </nav>

        <div class="header-actions">
          <div class="lang" aria-label="Language switch">
            <button class="btn btn-ghost btn-sm" type="button" data-lang="hu">HU</button>
            <button class="btn btn-ghost btn-sm" type="button" data-lang="en">EN</button>
          </div>
          <button class="btn btn-ghost" id="themeBtn" aria-label="Toggle theme">🌙</button>
          <a class="btn btn-primary" href="index.html#contact" data-i18n="cta.quote">Kérj ajánlatot</a>
        </div>
      </div>
    </header>

    <main>
      <section class="policy-wrap">
        <div class="container">
          <div class="card policy-card">
            <div class="pill" style="margin-bottom: 12px">
              <span class="dot"></span>
              <span data-i18n="legal.pill">Legal</span>
            </div>

            <h1>
              <span class="h1-top" data-i18n="terms.title">Title</span>
              <span class="h1-glow" data-i18n="terms.subtitle">Subtitle</span>
            </h1>

            <div class="policy-meta">
              <span class="chip chip-good">Horvath Systems</span>
            </div>

            <div class="policy-text" data-i18n-html="terms.body.html"></div>

            <div class="policy-actions">
              <a class="btn btn-primary" href="index.html#top" data-i18n="terms.back">Back to Home</a>
              <a class="btn btn-ghost" href="support.html" data-i18n="nav.support">Support</a>
            </div>
          </div>
        </div>
      </section>

      <footer class="footer">
        <div class="container footer-inner">
          <div class="footer-left">
            <img src="assets/logo.png" alt="" />
            <div>
              <div class="footer-title">HORVATH SYSTEMS</div>
              <div class="footer-sub">Modern Systems &amp; Software</div>
            </div>
          </div>

          <div class="footer-right">
            <a href="index.html#services" data-i18n="nav.services">Services</a>
            <span class="sep">•</span>
            <a href="index.html#projects" data-i18n="nav.projects">Projects</a>
            <span class="sep">•</span>
            <a href="index.html#contact" data-i18n="nav.contact">Contact</a>
            <span class="sep">•</span>
            <a href="privacy_policies.html" data-i18n="nav.privacy">Privacy Policy</a>
            <span class="sep">•</span>
            <a href="terms.html" data-i18n="nav.terms">Terms</a>
            <span class="sep">•</span>
            <a href="support.html" data-i18n="nav.support">Support</a>
          </div>
        </div>

        <div class="container footer-bottom">
          <span data-i18n-html="footer.rights.html"
            >© <span id="year"></span> Horvath-Systems. All rights reserved.</span
          >
        </div>
      </footer>
    </main>

    <script src="script.js"></script>
  </body>
</html>
